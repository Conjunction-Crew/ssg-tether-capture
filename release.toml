# cargo-release configuration for ssg-tether-capture (cargo-release v1.x format)
#
# NOTE: cargo-release v1.x uses top-level keys — do NOT wrap these in a
# [release] section; that header is silently ignored in v1.x.
#
# IMPORTANT: tag and push are disabled.  After `cargo release <level>` runs
# locally (bumping Cargo.toml + snapshotting versioned docs via the
# post-release-hook), the developer opens a PR to dev for review.  The
# auto-tag job in pr.yaml creates and pushes the tag automatically after the
# PR merges and all CI checks pass.  That tag push is the ONLY trigger for
# release.yml (build + GitHub Release) and deploy-docs.yml (docs-site deploy).

# Never publish to crates.io — this is a binary-only crate.
publish = false

# Do NOT create or push a git tag automatically.
tag = false
push = false

# cargo-release will still commit the Cargo.toml version bump and any files
# touched by the hooks below using the default commit message.
# Override the commit message template if desired:
# pre-release-commit-message = "chore: release {{version}}"

# Verify that the version was bumped and CHANGELOG.md is updated before
# cargo-release proceeds.  Runs in the maintainer's local environment.
pre-release-hook = ["./scripts/verify_release_pr.sh"]

# NOTE: cargo-release 1.x does not support a post-release-hook.
# For major/minor releases the versioned docs snapshot is created automatically
# by deploy-docs.yml when the release tag is pushed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "dev" ]
    # Also build and deploy when a version tag is pushed.
    # Both stable (v1.2.3) and beta (v1.2.3-beta.1) tags trigger a deploy so
    # the live docs site always reflects the latest release including
    # pre-releases.  Publishing to crates.io (not applicable here — binary
    # crate) would be gated separately in release.yml.
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./docs_site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./docs_site

      - name: Build website
        run: npm run build
        working-directory: ./docs_site

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs_site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Deploy on pushes to main OR on any version tag push (stable and beta).
    # Pull-request builds run the build job above but never deploy.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Release

# Triggers on SemVer tags:
#   v1.2.3          → production GitHub Release (latest)
#   v1.2.3-beta.1   → pre-release GitHub Release
#
# Push a tag to trigger:
#   git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Linux build → tar.gz
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libasound2-dev libudev-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-release-

      - name: Build release binary
        run: cargo build --release

      - name: Package tar.gz
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="ssg-tether-capture-${TAG}-linux-x86_64.tar.gz"
          mkdir -p dist
          cp target/release/ssg_tether_capture dist/
          cp -r assets dist/
          tar -C dist -czf "$ARCHIVE" .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ env.ARCHIVE }}

# ─────────────────────────────────────────────────────────────────────────────
# Windows build → .msi
#
# WiX v3.11 is pre-installed on windows-latest runners at %WIX%.
# assets/ is harvested at build time by heat.exe to avoid maintaining a
# static file list in source control.
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: WiX preflight
        shell: pwsh
        run: |
          Write-Host "WIX='$env:WIX'"
          if (!(Test-Path "$env:WIX\\bin\\heat.exe")) {
            Write-Error "WiX not found at $env:WIX\\bin\\heat.exe"
            exit 1
          }
          Get-ChildItem "$env:WIX\\bin" -Filter "*.exe" | ForEach-Object { Write-Host $_.Name }

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-release-

      - name: Build release binary
        run: cargo build --release

      - name: Harvest assets (WiX heat)
        run: |
          & "$env:WIX\bin\heat.exe" dir "assets" `
            -out "wix\assets_fragment.wxs" `
            -cg AssetsComponentGroup `
            -dr ASSETSDIR `
            -scom -sfrag -srd -sreg `
            -gg `
            -x "*.ttf" `
            -x "*.otf" `
            -var "var.AssetsDir"

      - name: Inspect harvested assets
        shell: pwsh
        run: |
          if (!(Test-Path "wix\\assets_fragment.wxs")) { Write-Error "assets_fragment.wxs not found"; exit 1 }
          Write-Host "----- wix\\assets_fragment.wxs (preview) -----"
          Get-Content wix\\assets_fragment.wxs -TotalCount 200 | ForEach-Object { Write-Host $_ }

          $raw = Get-Content wix\\assets_fragment.wxs -Raw
          if ($raw -match 'PUT-GUID-HERE') { Write-Error "Found placeholder GUID 'PUT-GUID-HERE' in assets_fragment.wxs"; exit 1 }

          $matches = Select-String -Path wix\\assets_fragment.wxs -Pattern 'Guid="([^"]*)"' -AllMatches
          $invalid = @()
          foreach ($m in $matches) { foreach ($g in $m.Matches) { $val = $g.Groups[1].Value; if (-not ($val -match '^[0-9a-fA-F]{8}(-[0-9a-fA-F]{4}){3}-[0-9a-fA-F]{12}$')) { $invalid += $val } } }
          if ($invalid.Count -gt 0) { Write-Error "Invalid GUIDs found: $($invalid -join ', ')"; exit 1 } else { Write-Host "All harvested GUIDs look valid." }

      - name: Build MSI
        run: |
          $tag     = "${{ github.ref_name }}"
          # WiX version must be X.Y.Z — strip 'v' prefix and any pre-release suffix
          $version = $tag -replace '^v', '' -replace '-.*$', ''
          $msi     = "ssg-tether-capture-${tag}-windows-x86_64.msi"

          & "$env:WIX\bin\candle.exe" `
            -dVersion="$version" `
            -dSourceDir="target\release" `
            -dAssetsDir="assets" `
            -arch x64 `
            "wix\main.wxs" `
            "wix\assets_fragment.wxs" `
            -out "wix\"

          # Verify that candle produced the expected .wixobj files before linking
          Write-Host "Verifying wix object files..."
          if (!(Test-Path "wix\\main.wixobj")) {
            Write-Error "Missing wix\\main.wixobj after candle.exe"
            Write-Host "wix directory listing:"; Get-ChildItem wix -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          if (!(Test-Path "wix\\assets_fragment.wixobj")) {
            Write-Error "Missing wix\\assets_fragment.wixobj after candle.exe"
            Write-Host "wix directory listing:"; Get-ChildItem wix -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "wixobj files present; proceeding to link with light.exe"

          & "$env:WIX\bin\light.exe" `
            -ext WixUIExtension `
            "wix\main.wixobj" `
            "wix\assets_fragment.wixobj" `
            -out "$msi"

          # Write MSI path to GitHub env in PowerShell-safe way
          Add-Content -Path $env:GITHUB_ENV -Value "MSI=$msi"

      - name: Windows MSI Debug info
        shell: pwsh
        run: |
          Write-Host "Contents of wix directory:"
          if (Test-Path wix) { Get-ChildItem wix -Recurse -Force | ForEach-Object { Write-Host $_.FullName } } else { Write-Host "wix directory not found" }
          Write-Host "Artifacts in target\\release:"
          if (Test-Path target\\release) { Get-ChildItem target\\release -Recurse | ForEach-Object { Write-Host $_.FullName } } else { Write-Host "target\\release not found" }
          Write-Host "GITHUB_ENV preview:"
          if (Test-Path $env:GITHUB_ENV) { Get-Content $env:GITHUB_ENV } else { Write-Host "GITHUB_ENV not found" }
          if (!(Test-Path $env:MSI)) { Write-Error "MSI not found: $env:MSI"; exit 1 } else { Write-Host "MSI exists: $env:MSI" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ env.MSI }}

# ─────────────────────────────────────────────────────────────────────────────
# macOS build → .dmg
#
# cargo-bundle creates a .app with the binary + assets inside Contents/Resources/.
# hdiutil (built-in) wraps the .app in a compressed DMG ready for distribution.
# The macOS CWD fix in src/main.rs ensures Bevy finds assets/ at runtime.
#
# NOTE: The .app is ad-hoc unsigned. Users on macOS 13+ must right-click → Open
# to bypass Gatekeeper on first launch. Add Apple Developer ID signing here when
# a certificate is available.
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: macos-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-release-

      - name: Install cargo-bundle
        run: |
          if ! command -v cargo-bundle &> /dev/null; then
            cargo install cargo-bundle
          fi

      - name: Build and bundle .app
        run: cargo bundle --release

      - name: macOS bundle debug
        run: |
          APP_PATH="target/release/bundle/osx/SSG Tether Capture.app"
          echo "Listing bundle directory:"
          ls -la "target/release/bundle" || true
          echo "Contents of app Contents/MacOS:"
          ls -la "$APP_PATH/Contents/MacOS" || true
          if [ -f "$APP_PATH/Contents/MacOS/ssg_tether_capture" ]; then
            file "$APP_PATH/Contents/MacOS/ssg_tether_capture" || true
            otool -L "$APP_PATH/Contents/MacOS/ssg_tether_capture" || true
          else
            echo "Binary not found inside app bundle!"
            exit 1
          fi
          uname -m

          # Ensure executable bits and sane permissions in the app bundle
          echo "Fixing permissions on app bundle (ensure exec bits)"
          chmod -R u+rwX,go+rX,go-w "$APP_PATH" || true

          # Run codesign / spctl diagnostics (will often fail for ad-hoc unsigned bundles)
          if command -v codesign >/dev/null 2>&1; then
            echo "Running codesign --verify (diagnostic only)"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH" || echo "codesign verification failed (expected for unsigned builds)"
          else
            echo "codesign not available"
          fi

          if command -v spctl >/dev/null 2>&1; then
            echo "Running spctl --assess (diagnostic only)"
            spctl --assess --type execute --verbose "$APP_PATH" || echo "spctl assessment failed (expected for unsigned builds)"
          else
            echo "spctl not available"
          fi

      - name: Package DMG
        run: |
          TAG="${{ github.ref_name }}"
          APP_PATH="target/release/bundle/osx/SSG Tether Capture.app"
          # Determine runner architecture for DMG naming
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH_LABEL="x86_64" ;;
            arm64) ARCH_LABEL="arm64" ;;
            *) ARCH_LABEL="$ARCH" ;;
          esac
          DMG="ssg-tether-capture-${TAG}-macos-${ARCH_LABEL}.dmg"

          hdiutil create \
            -volname "SSG Tether Capture" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG"

          if [ ! -f "$DMG" ]; then
            echo "DMG not created!"
            ls -la
            exit 1
          fi

          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Zip .app for debug upload
        run: |
          APP_PATH="target/release/bundle/osx/SSG Tether Capture.app"
          TAG="${{ github.ref_name }}"
          ARCH="$(uname -m)"
          APP_ZIP="ssg-tether-capture-${TAG}-macos-${ARCH}-app.zip"
          if [ -d "$APP_PATH" ]; then
            # Use ditto to preserve resource forks
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$APP_ZIP"
            echo "APP_ZIP=$APP_ZIP" >> "$GITHUB_ENV"
          else
            echo "App not found; skipping zip"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            ${{ env.DMG }}
            ${{ env.APP_ZIP }}

# ─────────────────────────────────────────────────────────────────────────────
# Publish GitHub Release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Show downloaded artifacts
        run: |
          echo "Artifacts content:"
          ls -R artifacts || true
          find artifacts -type f -maxdepth 4 -print || true

      - name: Detect pre-release
        id: flags
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          generateReleaseNotes: true
          prerelease: ${{ steps.flags.outputs.prerelease }}
          makeLatest: ${{ steps.flags.outputs.prerelease == 'false' }}
